<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Diane 🐰❤️</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffd6e0, #fff0f5);
    overflow: hidden;
  }

  .card {
    background: white;
    padding: 40px 30px;
    border-radius: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    text-align: center;
    width: 320px;
    animation: fadeIn 1s ease;
    position: relative;
  }

  @keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
  }

  .bunny {
    font-size: 52px;
    animation: bounce 1.5s infinite;
  }

  @keyframes bounce {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-10px);}
  }

  h2 {
    color: #444;
    margin: 15px 0 10px;
  }

  .subtext {
    font-size: 13px;
    color: #777;
    margin-bottom: 15px;
  }

  .buttons {
    margin-top: 10px;
  }

  button {
    border: none;
    padding: 12px 25px;
    font-size: 16px;
    border-radius: 12px;
    margin: 8px;
    cursor: pointer;
    transition: 0.25s;
    position: relative;
  }

  #yes {
    background: #ff6b81;
    color: white;
    box-shadow: 0 5px 15px rgba(255,107,129,0.4);
  }

  #yes:hover {
    transform: scale(1.1);
  }

  #no {
    background: #ddd;
  }

  .result {
    font-size: 26px;
    color: #ff4d6d;
  }

  .heart {
    position: absolute;
    font-size: 20px;
    animation: floatUp 3s linear forwards;
  }

  @keyframes floatUp {
    0% {transform: translateY(0); opacity: 1;}
    100% {transform: translateY(-700px); opacity: 0;}
  }
</style>
</head>

<body>

<div class="card" id="card">
  <div class="bunny">🐰</div>
  <h2>Diane, do you love me too? 🥺</h2>
  <div class="subtext">be honest… no pressure 🙂</div>

  <div class="buttons">
    <button id="yes" onclick="yesClick()">YES</button>
    <button id="no" onmouseover="moveNo()" onclick="noClick()">NO</button>
  </div>
</div>

<script>
let size = 16;
let noCount = 0;

function yesClick() {
  document.getElementById("card").innerHTML = `
    <div class="bunny">🐰💖</div>
    <div class="result">I love you more, Diane 😳❤️</div>
    <div class="subtext">pero seryoso… gusto talaga kita 🙂</div>
  `;
  startHearts();
}

function noClick() {
  const yesBtn = document.getElementById("yes");
  size += 10;

  yesBtn.style.fontSize = size + "px";
  yesBtn.style.padding = (12 + size/2) + "px " + (25 + size) + "px";

  noCount++;
  const q = document.querySelector("h2");

  if (noCount === 2) q.innerText = "Sure ka, Diane? 😅";
  if (noCount === 4) q.innerText = "Kahit konti lang? 🥺";
  if (noCount === 6) q.innerText = "Sige na please 🐰👉👈";
}

function moveNo() {
  const btn = document.getElementById("no");
  const x = Math.random() * 200 - 100;
  const y = Math.random() * 200 - 100;

  btn.style.transform = `translate(${x}px, ${y}px)`;
}

function startHearts() {
  setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = "100%";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 3000);
  }, 250);
}
</script>

</body>
</html>
